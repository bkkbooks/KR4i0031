body:
  text: 文則巻上宋陳騤撰文則上共六十三則六經之道既曰同歸六經之文容無異體故易文似詩詩文似書書文似禮中孚九二曰鳴鶴在隂其子和之我有好爵吾與爾靡之使入詩雅孰别爻辭抑二章曰其在于今興迷亂于政顛覆厥徳荒湛于酒汝雖湛樂從弗念厥紹㒺敷求先王克共眀刑使入書誥孰别雅語顧命曰牖間南嚮敷重篾席黼純華玉仍几西序東嚮敷重底席綴純文貝仍几東序西嚮敷重豐席畫純雕玉仍几西夾南嚮敷重筍席𤣥紛純漆仍几使入春官司几筵孰别命語或曰六經創意皆不相師試探精微足眀詭説洪範曰睿作聖眀作哲聰作謀恭作肅從作乂小旻五章曰國雖靡止或聖或否民雖靡膴或哲或謀或肅或艾此詩創意師于書也鄭康成箋曰詩人之意欲王敬用五事以眀天道儀禮曰皇尸命工祝承致多福無疆于女孝孫来女孝孫使女受禄于天宜稼于田眉夀萬年勿替引之此少牢嘏辭楚茨四章曰工祝致告徂賚孝孫苾芬孝祀神嗜飲食卜爾百福如㡬如式此詩創意師于禮也鄭康成箋云此皆嘏辭之意夫樂奏而不和樂不可聞文作而不協文不可誦文協尚矣是以古人之文發於自然其協也亦自然後世之文出於有意其協也亦有意書曰任賢勿貳去邪勿疑疑謀勿成百志惟熙易曰乾剛坤柔比樂師憂臨觀之義或與或求禮記曰元酒在室醴醆在户粢醍在堂澄酒在下陳其犧牲備其鼎爼列其琴瑟管磬鐘鼓脩其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜若此等語自然協也書曰無偏無黨王道蕩蕩無黨無偏王道平平詩曰不眀爾徳時無背無側爾徳不眀以無陪無卿二者皆倒上句又協之一體揚雄法言曰堯舜之道皇兮夏殷周之道将兮而以延其光兮讀之雖協而典誥之氣索然矣且事以簡為上言以簡為當言以載事文以著言則文貴其簡也文簡而理周斯得其簡也讀之疑有闕焉非簡也踈也春秋書曰隕石于宋五公羊傳曰聞其磌然視之則石察之則五公羊之義經以五字盡之是簡之難者也劉向載泄冶之言曰夫上之化下猶風靡草東風則草靡而西西風則草靡而東在風所由而草為之靡此用三十有二言而意方顯及觀論語曰君子之徳風小人之徳草草上之風必偃此减泄冶之言半而意亦顯又觀書曰爾惟風下民惟草此復减論語九言而意愈顯吾故曰是簡之難者也書曰能自得師者王謂人莫已若者亡劉向載楚荘王之言曰其君賢君也而又有師者王其君下君也而羣臣又莫君若者亡語意煩簡不如是何以别經傳之文文之作也以載事為難事之載也以蓄意為工觀左氏傳載晋敗於邲先濟者賞之事但云中軍下軍争舟舟中之指可掬則攀舟亂刀斷指之意自蓄其中又載楚師寒拊勉之事但云三軍之士皆如挾纊則軍情愉悦之意自蓄其中公羊傳載秦敗于殽之事但云匹馬隻輪無反者則要擊之意自蓄其中若公羊傳載齊使人迓卻克臧孫之事則曰客或跛或眇于是使跛者迓跛者使眇者迓眇者孟子載天下歸舜之事則曰天下諸侯朝覲者不之堯之子而之舜訟獄者不之堯之子而之舜謳歌者不謳歌堯之子而謳歌舜凡此則意随語竭不容致思詩書之文有若重複而意實曲折者詩曰云誰之思西方羙人彼羙人兮西方之人兮此思賢之意自曲折也又曰自古在昔先民有作此考古之意自曲折也書曰眇眇予末小子此謙托之意自曲折也又曰孺子其朋孺子其朋其徃此告戒之意自曲折也文有意相屬而對偶者如發彼小豝殪此大兕誨爾諄諄聴我藐藐故謀用是作而兵由此起有事相類而對偶者如威侮五行怠棄三正佑賢輔徳顯忠遂良此皆混然而成初非有意嫓配凡文之對偶者如此則工矣古人之文用古人之言也古人之言後世不能盡識非得訓切殆不可讀如登崤險一歩九歎既而强學焉捜摘古語撰叙今事殆如昔人所謂大家婢學夫人舉止羞澁終不似真也今取在當時為常語而後人視為艱苦之文如周禮曰犬赤股而躁臊鳥皫色而沙鳴貍豕盲眂而交睫腥馬黒眷而般臂螻詩曰游環脅驅隂靷鋈續又曰鉤膺鏤鍚鞹鞃淺幭荘子曰乃始臠巻傖囊而亂天下也荀子曰按角鹿埵隴種東籠而退耳詩禮之義先儒注解備見若荘子言臠巻不申舒之貌傖囊猶搶攘也荀子所言皆兵摧敗披靡之貌大扺文士題命篇章悉有所本自孔子為書作序孔子書序縂為一萹孔安國各分繫之萹目文遂有序自孔子為易説卦文遂有説栁宗元天説之類自有曽子問哀公問之類文遂有問屈原天問之類自有考工記學記之類文遂有記自有經解王言解之類王言解見家語文遂有解韓愈進學解之類自有辯政辯物之類二辯見家語文遂有辯宋玉九辯之類自有樂論禮論之類二論見荀子文遂有論賈誼過秦論之類自有大傳小傳之類二傳見禮記文遂有傳文有助辭猶禮之有儐樂之有相也禮無儐則不行樂無相則不諧文無助則不順唐有杜溫夫者為文不識助辭疑之之辭如耶乎之類决之之辭如耳矣之類皆一用之栁宗元所以深言其病可不知㢤檀弓曰勿之有悔焉耳矣孟子曰寡人盡心焉耳矣檀弓曰我弔也與㢤左氏傳曰獨吾君也乎㢤凡此一句而三字連助不嫌其多也左氏傳曰其有以知之矣又曰其無乃是也乎此二者六字成句而四字為助亦不嫌其多也檀弓曰南宫縚之妻之姑之䘮樂記曰不知手之舞之足之蹈之也凡此不嫌用之字為多禮記曰言則大矣羙矣盛矣此不嫌用矣字為多檀弓曰羙㢤奐焉論語曰富㢤言乎凡此四字成句而助辭半之不如是文不健也司馬長卿封禪文曰遐㢤邈乎此雖知助辭而遐邈同義又失之矣左氏傳曰羙㢤泱泱乎大風也㢤表東海者其太公乎國未可量也此文每句終用助讀之殊無齟齬艱辛之態左氏傳曰以三軍軍其前欲見下軍字有陳列之意則當用其字為有力公羊傳曰勇士入其大門則無人門焉者欲見下門字有守禦之意則當用焉者字為有力倒言而不失其言者言之妙也倒文而不失其文者文之妙也文有倒語之法知者罕矣春秋書曰吴子謁伐楚門于巢卒公羊傳曰門于巢卒者何入門乎巢而卒也然夫子先言門後言于巢者於文雖倒而寓意深矣何休曰吴子欲伐楚過巢不假塗卒暴入巢門門者以為欲犯巢而射殺之君子不怨所不知故與巢得殺之使若吴為自死文所以彊守禦也仲山甫誠歸于謝詩則曰謝于誠歸隐盗所得器左氏傳則曰盗所隐器於義皆不害也禹貢曰厥篚元纎縞又曰雲土夢作乂用纎字不在元上土字不在夢下亦一倒法也司馬遷作夏本紀改曰雲夢土作乂烏足與知此字有偏旁故文有取偏旁以成句字有音韻故文有取音韻以成句皆所以明其義也周禮曰五人為伍中庸曰誠者自成也孟子曰征之為言正也荘子曰庸也者用也檀弓曰夫祖者且也祭統曰銘者自名也表記曰仁者人也凡此皆取偏旁者也鄊飲酒義曰秋之為言愁也又曰冬者中也易曰嗑者合也樂記曰樂者樂也孟子曰校者教也揚子曰禮以體之凡此皆取音韻者也夫文有病辭有疑辭病辭者讀其辭則病究其意則安如曲禮曰猩猩能言不離禽獸繫辭曰潤之以風雨盖禽字於猩猩為病潤字於風為病也説者曰凡可擒者皆謂之禽大宗伯以禽作六摯而羔在其中凡物氣和則潤生言潤則風之和可知矣疑辭者讀其辭則疑究其意則斷如何彼穠矣曰平王之孫檀弓曰容居魯人也盖平王疑為東遷之平王魯人疑為魯國之人也毛甚傳云平正也指文王言能正天下之王也鄭康成云魯鈍也凡觀此文可不深考辭以意為主故辭有緩有急有輕有重皆生乎意也范宣子曰吾淺之為丈夫也則其辭緩景春曰公孫衍張儀豈不誠大丈夫㢤則其辭急狼瞫於是乎君子則其辭輕子謂子賤君子㢤若人則其辭重文有雖成一家而有已經雕斵與其否者且左氏傳前載辛伯諌曰並后匹嫡兩政耦國後載狐突諌曰昔辛伯諗周桓公云内寵並后外寵二政嬖子配適大都耦國則知前載已雕斵而後載否矣内傳曰所謂生死而肉骨也外傳曰繄起死人而肉白骨也則知内傳雕斵而外傳否矣易之有象以盡其意詩之有比以逹其情文之作也可無喻乎博采經傳約而論之取喻之法大槩有十略條于後一曰直喻或言猶或言若或言如或言似灼然可見孟子曰猶縁木而求魚也書曰若朽索之馭六馬論語曰譬如北辰荘子曰凄然似秋此類是也二曰隐喻其文雖晦義則可尋禮記曰諸侯不下漁色謂國君内取國中象捕魚然中網取之是無所擇國語曰歿平公軍無秕政秕穀之不成者以喻政又曰雖蝎譛焉避之蝎木虫譛従中起如蝎食木木不能避也左氏傳曰是豢吴也夫若人飬犠牲公羊傳曰其諸為其雙雙而俱至者與言齊髙固及子叔姬来其雙雙行匹至似於鳥獸山海經有獸名雙雙此類是也三曰類喻取其一類以次喻之書曰王省惟嵗師尹惟日卿士惟月嵗日月一類也賈誼新書曰天子如堂羣臣如陛衆庻如地堂陛地一類也此類是也四曰詰喻雖為喻文似成詰難論語曰虎兕出於柙龜玉毁於櫝中是誰之過歟左氏傳曰人之有墻以蔽惡也墻之隙壊誰之咎也此類是也五曰對喻先比後證上下相符荘子曰魚相忘乎江湖人相忘乎道術荀子曰流丸止於甌㬰流言止於智者此類是也六曰博喻取以為喻不一而足書曰若金用汝作礪若濟巨川用汝作舟楫若嵗大旱用汝作霖雨荀子曰猶以指測河也猶以戈舂黍也猶以錐飱壺也此類是也七曰簡喻其文雖略而意甚明左氏傳曰名徳之輿也揚子曰仁宅也此類是也八曰詳喻須假多辭然後義顯荀子曰夫耀蟬者務在其明乎火振其木而已火不明雖振其木無益也今人主有能明其徳則天下歸之若蟬之歸明火也此類是也九曰引喻援取前言以證其事左氏傳曰諺所謂庇焉而縦尋斧焉者也禮記曰蛾子時術之其此之謂乎此類是也十曰虚喻既不指物亦不指事論語曰其言似不足者老子曰飂兮似無所止此類是也凡伯刺厲之詩而曰先民有言板三章曰先民有言詢于芻蕘鄭康成云此古賢者之言也吉甫美宣之詩而曰人亦有言烝民五章曰人亦有言柔則茹之剛則吐之此亦謂前人有言如此嗣候之征乃舉政典政典曰先時者殺無赦不及時者殺無赦孔安國云政典夏后為政之典籍盤庚之告亦載遅任遅任有言曰人惟求舊器非求舊惟新孔安國云遅任古賢人也或稱古人言泰誓曰古人有言曰撫我則后虐我則讎此類是也或稱我聞曰康誥曰我聞曰怨不在大亦不在小此類是也是皆有所援引也詩書而降傳記籍籍援引之言不可具載且左氏採諸國之事以為經傳戴氏集諸儒之萹以成禮志援引詩書莫不有法推而論之盖有二萹一以㫁行事二以證立言二者又各分三體略條于後左氏傳載詩曰自詒伊戚其子臧之謂矣此獨引詩以㫁之是一體也此體多矣左氏傳載詩曰于以采蘩于沼于沚于以用之公侯之事秦穆有焉夙夜匪懈以事一人孟明有焉貽厥孫謀以燕翼子子桑有焉此各引詩以合㫁之是二體也表記載詩曰莫莫葛藟施於條枚豈弟君子求福不囘其舜禹文王周公之謂與此又一詩縂㫁之體也國語載詩曰其類維何室家之壼君子萬年永錫祚𦙍類也者不忝前哲之謂也壼也者廣裕民人之謂也萬年也者令聞不忘之謂也𦙍也者子孫蕃育之謂也單子朝夕不忘成王之徳可謂不忝前哲矣膺保明徳以佐王室可謂廣裕民人矣若能類善物以混厚民人者必有章譽蕃育之祚則單子必當之矣此既引詩文又釋其義以㫁之是三體也大學載康誥曰克明徳太甲曰顧諟天之明命帝典曰克明峻徳湯之盤銘曰茍日新日日新又日新康誥曰作新民詩曰周雖舊邦其命惟新是故君子無所不用其極此則采搃羣言以盡其義是一體也緇衣曰好賢如緇衣惡惡如巷伯則爵不凟而民作愿刑不試而民咸服大雅曰儀刑文王萬邦作孚此則言終引證是二體也孝經諸萹􅊖用此體左氏傳曰周書所謂庸庸祇祇者謂此物也夫又曰泰誓所謂商兆民離周十人同者衆也此乃斷析本文以成其言是三體也夫取詩即云詩取書即云書盖常體也觀以湯誥為先王之令國語稱先王之令曰天道福善禍滛故凡我造邦無従匪彛此皆湯誥文周書為西方之書國語稱西方之書盖逸周書韋昭云詩言西方之人兮則西方謂周也以咸有一徳為尹告禮記稱尹告曰惟尹躬暨湯咸有一徳康成云尹告伊尹之誥以大禹謨為道經荀子稱道經曰人心惟危道心惟微楊倞云此在虞書曰道經者言有道之經也不曰仲虺之誥而曰仲虺之志左氏傳曰仲虺之志云亂者取之亡者侮之不曰五子之歌而曰夏訓有之左氏傳曰夏訓有之有窮后羿直言鄭詩曺詩國語稱鄭詩曰仲可懐也又稱曺詩曰彼其之子不遂其媾止稱汋曰武曰左氏傳汋曰於鑠王師武曰無競維烈或稱芮良夫左氏傳曰周芮良夫之詩曰大風有隧貪人敗類或稱周文公國語曰周文公之頌曰載戢干戈載櫜弓矢指那頌卒章為亂辭國語曰其輯之亂曰自古在昔先民有作韋昭云凡作萹章義既成撮其大要以為亂辭摘小宛首章為篇目國語曰秦伯賦鳩飛章昭云小宛之首章宛彼鳴鳩翰飛戾天是也數章之未章既謂之卒章左氏傳曰賦緑衣之卒章此類是也一章之末句亦謂之卒章左氏傳曰作武其卒章曰耆定爾功凡此似亦略施雕琢少變雷同作者考焉毋誚無補左氏傳載諸國燕饗賦詩之事但云賦某詩或云賦某詩之卒章皆不載詩文而意自具其曰賦棠棣之七章以卒則知賦七章以卒盡八章也其曰在揚水卒章之四言矣則知取我聞有命也左氏於此等文最為得體文有上下相接若繼踵然其體有三其一曰叙積小至大如中庸曰能盡其性則能盡人之性能盡人之性則能盡物之性能盡物之性則能賛天地之化育賛天地之化育則可與天地參矣此類是也其二曰叙由精及粗如荘子曰古之明大道者先明天而道徳次之道徳已明而仁義次之仁義已明而分守次之分守已明而形名次之形名已明而因任次之因任已明而原省次之原省已明而是非次之是非已明而賞罰次之此類是也其三曰叙自流極原如大學曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先脩其身欲脩其身者先正其心欲正其心者先誠其意欲誠其意者先致其知此類是也文有交錯之體若纒糾然主在析理理盡後已書曰念兹在兹釋兹在兹名言兹在兹允出兹在兹荘子曰有始也者有未始有始也者有未始有夫未始有始也者又曰以指喻指之非指不若以非指喻指之非指也荀子曰不利而利之不如利而後利之之利也利而後利之不如利而不利者之利也國語曰成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣榖梁曰人之所以為人者言也人而不能言何以為人言之所以為言者信也言而不信何以為言信之所以為信者道也信而不道何以為道此類多矣不可􅊖舉然取荘子而法之則文斯邃矣載事之文有上下同目之法謂其事㫁可書其人㫁可羙也如論語載孔子之羙禹顔子曰禹吾無間然矣菲飲食而致孝乎􅄦神云云禹吾無間然矣又曰賢㢤回也一簞食一瓢飲云云賢㢤回也戴禮之記文王周公文王世子萹曰文王之為世子也朝扵王季日三云云文王之為世子也又曰昔者周公攝政踐祚而治抗世子法於伯禽所以善成王也云云周公踐祚公羊之傳孔父仇牧荀息公羊傳曰孔父可謂義形於色矣其義形於色奈何督将弑殤公孔父生而存則殤公不可得而弑也云云孔父可謂義形於色矣又曰仇牧可謂不畏彊禦矣其不畏彊禦奈何萬嘗與荘公戰獲乎荘公云云仇牧可謂不畏彊禦矣又曰荀息可謂不食其言矣其不食其言奈何奚齊卓子者驪姬之子荀息傅焉云云荀息可謂不食其言矣皆其法也數音所人行事其體有三或先縂而後數之如孔子謂子産有君子之道四焉其行已也恭其事上也敬其養民也恵其使民也義此類是也或先數而後縂之如子産數鄭公孫黒曰爾有亂心無厭國不女堪専伐伯有而罪一也昆弟争室而罪二也薫隧之盟女矯君位而罪三也有死罪三何以堪之此類是也或先既縂之而後復縂之如孔子言臧文仲其不仁者三不知者三下展禽廢六闗妾織蒲三不仁也作虚器縦逆祀祀爰居三不知也此類是也載事之文有先事而㫁以起事也有後事而㫁以盡事也如左氏傳欲載晋靈公厚斂雕墻必先言晋靈公不君公羊傳欲載楚靈王作乾谿臺必先言靈王為無道中庸欲言舜好問而察邇言亦先言舜其大知也歟孟子欲言梁恵王以其所愛及其所不愛亦先曰不仁㢤梁恵王也若此流皆先㫁以起事也如左氏傳載晋文公教民而用卒言之曰一戰而覇文之教也又載晋悼公賜魏絳和戎樂卒言之曰魏絳於是乎有金石之樂禮也若此流皆後㫁以盡事也載言之文有不避重複如榖梁傳載麗姬故謂君曰吾夜者夢夫人趨而来曰吾苦畏胡不使大夫将衛士而衛冡乎故君謂世子曰麗姬夢夫人趨而来曰吾苦畏女其将衛士而往衛冡乎此不避重複一也家語載魯公索氏将祭而忘其牲孔子聞之曰公索氏不及二年而後亡後一年而亡門人問曰昔公索氏将祭而忘其牲而夫子曰不及二年今過朞而亡此不避重複二也公羊傳載陽處父諌曰射姑民衆不悦不可使将於是廢将陽處父出射姑入君謂射姑曰陽處父言曰射姑民衆不悦不可使将此不避重複三也及觀檀弓載子游曰昔者夫子居於宋見桓司馬自為石椁三年不成夫子曰若是其靡也死不如速朽之愈也死之欲速朽為桓司馬言之也云云曽子以子游之言告於有子然檀弓但云以子游之言盖避重複也又左氏傳載晋師歸卻伯見公曰子之力也夫范叔見勞之如卻伯欒伯見公亦如之夫三述晋侯之語固未為害而左氏兩變其文盖避重複也載言之文又有荅問若止及一事文固不難至有數端文實未易所問不言問所對不言對言雖簡略意實周贍讀之續如貫珠應如荅響若左氏傳載楚望晋軍問伯州犂盖得此也至於問則屢稱何也荅則屢稱對曰其文與意有異左氏若樂記載賔牟賈與孔子言樂皆拘此也二文具載則可考矣王曰騁而左右何也曰召軍吏也皆聚於中軍矣曰合謀也張幕矣曰䖍卜於先君也徹幕矣曰将發命也甚囂且塵上矣曰将塞井夷竈而為行也皆乗矣左右執兵而下矣曰聴誓也戰乎曰未可知也乗而左右皆下矣曰戰禱也曰夫武之備戒之已久何也對曰病不得其衆也咏歎之淫液之何也對曰恐不逮事也發揚蹈厲之已蚤何也對曰及時事也武坐致右憲左何也對曰非武坐也聲滛及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也觀孟子與陳相荅問許子之事曰許子必種粟而後食乎曰然許子必織布而後衣乎曰否許子衣褐許子冠乎曰冠曰奚冠曰冠素曰自織之與曰否以粟易之曰許子奚為不自織曰害於耕曰許子以釡甑㸑以鐡耕乎曰然自為之與曰否以粟易之此文但存上一許子以下許子字皆可除信乎荅問之文難也文有目人之體有列氏之體論語曰徳行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子游子夏此目人之體也而揚雄班固得之揚子法言曰羙行園公綺里季夏黄公甪里先生言辭婁敬陸賈執政王陵申屠嘉忻節周昌汲黯守儒轅固申公災異董相夏侯勝京房班固作公孫宏傳賛曰儒雅則公孫宏董仲舒兒寛篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時云云左氏傳曰殷民六族條氏徐氏蕭氏索氏長勺氏尾勺氏此列氏之體也而荘周司馬遷得之荘子曰子不見至徳之世乎容成氏大庭氏柏皇氏中央氏栗陸氏驪畜氏云云司馬遷作夏本紀賛曰其後分封用國為姓故有夏后氏有扈氏有男氏斟尋氏彤城氏褒氏云云禮記之文始自后倉成於戴聖非純格言間有淺語如掩口而對毋投與狗骨􅃵之有菜者用梜男女相荅拜也癢不敢搔衣裳綻裂年未滿五十取婦之家嫂不撫叔叔不撫嫂若此䓁語雖在曲防人情然亦少施斵削商盤告民民何以曉然在當時用民間之通語非若後世待訓詁而後眀且顛木之有由蘖使晋衛間人讀之則蘖知為餘也不能胥匡以生使東齊間人讀之則胥知為皆也欽念以忱使燕岱間人讀之則忱知為誠也由此考之當時豈不然乎詩文待訓眀者亦本風土所宜且王室如燬使齊人讀之則燬為常語六日不詹使楚人讀之則詹為常語燬火也齊人以火為燬詹至也楚人以至為詹儀禮周家之制也事渉威儀文苦而難讀鄉黨孔門之記也言闗訓則文婉而易觀今略摘儀禮之文證以鄉黨昭然辨矣執圭入門鞠躬焉如恐失之鄉黨曰執圭鞠躬如也如不勝下階發氣怡焉再三舉足又趨鄉黨曰出降一等逞顔色怡怡如也沒階趨進翼如也及享發氣盈容鄉黨曰享禮有容色賔出公再拜送賔不顧鄉黨曰賔退必復命曰賔不顧矣若君賜之食君祭先飯鄉黨曰侍食於君君祭先飯孝經之文簡易醇正蘊聖人之氣象掲六經之表儀夷考其文有所未諭三才章首似摭子産言禮之辭子太叔對趙簡子曰聞諸大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之則天之明因地之性孝經止三字不同聖治章末似刪文子論儀之語北宫文子對衛㐮公曰故君子在位可畏施舎可愛進退可度周旋可則容止可觀作事可法徳行可象孝經則曰君子則不然言思可道行思可樂徳義可尊作事可法容止可觀進退可度事君章曰進思盡忠退思補過此乃士貞子諌晋景公之辭聖治章曰以順則逆民無則焉不在於善而皆在於凶徳此乃季文子對魯宣公之辭左氏傳作訓昏三字不同聖人雖尚稽格言不應雷同如此豈作傳者反竊經與爾雅之作主在訓言謚法之作用以定謚皆周公之文也戴聖之釋淇澳備採爾雅之辭禮記曰如切如磋者道學也如琢如磨者自脩也瑟兮僴兮者怐慄也赫兮喧兮者威儀也有斐君子終不可諼兮者道盛徳至善民之不能忘也此乃爾雅釋訓文成鱄之釋皇矣端倣謚法之體左傳曰心能制義曰度徳正應和曰莫照臨四方曰明勤施無私曰類教誨不倦曰長賞慶刑威曰君慈和徧服曰順經天緯地曰文謚法體如此文亦有同者孰謂類皆後人之補緝無補作者之監觀夫論語家語皆夫子與當時公卿大夫及羣弟子荅問之文然家語頗有浮辭衍説盖出於羣弟子共相叙述加之潤色其才或有優劣故使然也若論語雖亦出於羣弟子所記疑若已經聖人之手今畧考焉子曰為命裨諶草創之世叔討論之行人子羽修餙之東里子産潤色之質之左氏則此文簡而整左氏傳曰禆諶謀於野則獲謀於邑則否鄭國将有諸侯之事子産乃問四國之為於子羽且使多為辭令與裨諶乗以適野使謀可否而告馮簡子使㫁之事成乃授子太叔使行之以應對賔客子曰孟之反不伐奔而殿将入門䇿其馬曰非敢後也馬不進也質以左氏則此文緩而周左氏傳曰孟之側後入以為殿抽矢䇿其馬曰馬不進也南宫三復白圭司馬遷則曰三復白圭之玷辭雖備而其意竭矣在邦必逹在家必逹司馬遷則曰在邦及家必逹辭雖約而其意踈矣彼揚雄法言王通中説模儗此書未免畫虎類狗之譏法言曰如其智如其智雖有民焉得而塗諸三年不目日視必盲三年不目月精必矇魯仲連偒而不剬簡相如剬而不偒清條曰非正不視非正不聴非正不言非正不行若張子房之智陳平之無悮絳侯勃之果霍将軍之勇終之以禮樂則可謂社稷之臣矣法言之模儗論語皆此類也中説曰可與共樂未可與共憂可與共憂未可與共樂我未見勤者矣盖有焉我未之見也焉知来者之不如昔也是故惡夫異端者小不忍致大災知之者不如行之者行之者不如安之者中説之模儗論語皆此類也王充問孔之篇而於此書多所指擿亦未免桀犬吠堯之罪歟詩人庭燎之詠文雖羙之意則箴之張老輪奐之辭文雖頌之意則譏矣晋獻文子成室張老曰羙㢤輪焉羙㢤奐焉歌於斯哭於斯聚國族於斯自漢而来靡麗之賦勸百諷一烏足知此文出於已作之固難語借於古用亦不易觀厯代雕蟲小技之士借古語以成萹章者紛紛藉藉試陳一二以鑒後来張茂先勵志詩曰徳輶如羽又曰熠燿宵流雖變二字以恊音韻而不知詩人言行有緩飛之意言毛有至輕之喻應吉甫華林集詩有曰文武之道厥猷未墜既言之道復綴厥猷此所謂屋下架屋者歟陸倕石闕銘曰惟王建國正位辨方遂令辨方後於正位此所謂轉衣為裳者歟古語曰黶子在頰則好在顙則醜言有宜也自晋以降操觚含毫之士喜學經語者多矣且如孫盛著史書曰某年春帝正月謂盛作魏晋陽秋也且春秋書王正月示魯侯用周天子正朔曺馬躬有天下不當書帝正月謝恵連作賦廼曰雪之時義逺矣㢤謂恵連作雪賦也案易卦義深者以此語賛之大抵文士雪月之詠非所當也此盖不知黶子在顙之為醜也觀檀弓之載事古簡而不踈旨深而不晦雖左氏之富艶敢奮飛於前乎略舉二事世子申生為驪姬所譛或令辨之左氏載其事則曰或謂太子子辭君必辨焉太子曰君非姬氏居不安食不飽我辭姬必有罪君老矣吾又不樂檀弓則曰子盍言子之志於公乎世子曰不可君安驪姬是我傷公之心也考此則檀弓為優榖梁傳載其事曰世子之傅里克謂世子曰入自明入自明則可以生不入自明則不可以生世子曰吾君已老矣已昏矣若此而入自明明則驪姬必死驪姬死則吾君不安若此文非唯不及檀弓亦不及左氏矣智悼子未𦵏晋平公飲以樂杜蕢謂大臣之䘮重於疾日不樂左氏言其事則曰辰在子夘謂之疾日君徹晏樂學人舎業為疾故也君之卿佐是謂股肱股肱或虧何痛如之檀弓則曰子夘不樂智悼子在堂斯其為子夘也大矣考此則檀弓為優鶴脛雖長㫁之則悲鳬脛雖短續之則憂檀弓文句長短有法不可增損其類是㢤長句法毋乃使人疑夫不以情居瘠者乎㢤孰有執親之䘮而沐浴佩玉者乎蕢尚不如杞梁之妻之知禮也茍無禮義忠信誠慤之心以涖之短句法華而晥立孫畏厭溺鼓瑟不難難於調弦作文不難難於練句檀弓之文練句益工㕘之家語其妙覩矣遇負杖入保者息家語曰遇人入保負杖者息皆死焉家語曰奔敵死焉比御而不入家語曰可御而䖏内南宫縚之妻之姑之䘮家語曰南宫縚之妻孔子之兄女䘮其姑予惡夫涕之無從也家語曰吾惡夫涕而無以将之仲子亦猶行古之道也家語曰仲子亦猶行古人之道夫子為弗聞也者而過之家語曰夫子為之隐佯不聞以過之遂命覆醢家語曰遂令左右皆覆醢死不如速朽之愈也家語曰死不如朽之速愈若䰟氣則無不之也家語曰若䰟氣則無所不之考工記之文𣙜而論之盖有三羙一曰雄健而雅二曰宛曲而峻三曰整齊而醇略條於後雄健而雅鄭之刀宋之斤魯之削吴粤之劔遷乎其地而弗能為良凡為弓方其峻而髙其柎長其畏而薄其敝左氏傳曰恤其患而補其闕正其違而治其煩亦此法也宛曲而峻凡攫閷援簭之類必深其爪出其目作其鱗之而深其爪出其目作其鱗之而則於眡必撥爾而怒茍撥爾而怒則於任重宜且其匪色必似鳴矣爪不深目不出鱗之而不作則必穨爾如委矣茍穨爾如委則加任焉則必如将廢措其匪色必似不鳴矣此文説筍簴之獸也引而信之欲其直也信之而直則取材正也信之而枉則是一方緩一方急也若茍一方緩一方急則及其用之也必自其急者先裂若茍自急者先裂則是以博為帴也此文説制韋革整齊而醇爍金以為刄凝土以為器棧車欲弇飾車欲侈鍾大而短則其聲疾而短聞鍾小而長則其聲舒而逺聞已上則摩其旁已下則摩其耑春秋文句長者踰三十餘言短者止於一言如季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晋卻克衛孫良夫曺公子首及齊侯戰于鞌之類是長句也如螽之類是短句也詩之文句長者不踰八言短者不減二言八言者如我不敢効我友自逸之類是也摰虞云詩有九言泂酌彼行潦挹彼注兹是也然此當為二句其説非也二言者若肇禋之類春秋主於褒貶詩則本於羙刺立言之間莫不有法詩人之用助辭辭必多用韻有用也辭若何其䖏也必有與也䖏與為韻有用而辭若俟我於著乎而充耳以素乎而著素為韻有用矣辭若陟彼砠矣我馬瘏矣砠瘏為韻有用忌辭若抑磬控忌抑縦送忌控送為韻有用兮辭若其實七兮迨其吉兮七吉為韻有用之辭若知子之順之雜佩以問之順問為韻有用止辭如既曰庸止曷又従止庸従為韻止即只鄘柏舟詩亦用只為辭離騷有大招用只辭盖法此有用且辭若椒聊且逺條且聊條為韻如四句六句者多矣今不備載又禮記非詩人之文助辭之上亦有韻恊如曰禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉此則用焉辭而職極服則為協孔頴逹曰詩章之法不常厥體或重章共述一事采蘋之類或一事疊為數章甘棠之類或初同而末異東山之類或首異而末同漢廣之類或事訖而更申既醉之類或章重而事別鴟鴞之類或随時而改色何草不黄也或因事而變文文王有聲也或一章而再言采采芣苢或三章而一發賔之初筵萹有數章章句衆寡不䓁章有數句句有多少不同包括詩體孰踰此説故特取焉文則巻上
