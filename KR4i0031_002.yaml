body:
  text: 文則巻下宋陳騤撰文則下共二十九則文有數句用一類字所以壮文勢廣文義也然皆有法韓退之為古文覇於此法尤加意焉如賀冊尊號表用之謂字盖取易繫辭畫記用者字盖取考工記南山詩用或字盖取詩北山悉注于後孰謂退之自作古㢤觀退之畫記云騎而立者五人騎而被甲載兵立者十人騎且負者二人騎執器者二人自此以下凡記人數者盖取書顧命二人雀弁執恵四人綦弁執戈上刄一人冕執劉一人冕執鉞一人冕執瞿一人冕執鋭之法也此與用字一類不同姑附於此示退之之文不妄作也用一類字不可徧舉采經子通用者志之可觸類而長矣或法詩北山曰或燕燕居息或盡瘁事國或息偃在床或不已於行或不知叫號或惨惨劬勞或棲遅偃仰或王事鞅掌或湛樂飲酒或惨惨畏咎或出入風議或靡事不為退之南山詩云或連若相従或蹙若相門或妥若弭伏或竦若驚雊或散若瓦解或赴若輻湊或翩若船遊或决若馬驟此句稍多不䏻備載皆廣北山或字法而用之也老子曰凡物或行或随或歔或吹或强或羸或載或隳此又一法也者法考工記曰脂者膏者羸者羽者鱗者又曰以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胷鳴者荘子激者謞者叱者吸者叫者譹者宎者咬者韓退之畫記云行者牽者涉者陸者翹者顧者鳴者寝者訛者立者人立者齕者飲者溲者陟者降者凡此用者字其原出於考工記因用荘子法也之謂法繫辭曰富有之謂大業日新之謂盛徳生生之謂易成象之謂乾效法之謂坤極數知来之謂占通變之謂事隂陽不測之謂神韓退之賀冊尊號表云臣聞體仁以長人之謂元發而中節之謂和無所不通之謂聖妙而無方之謂神經緯天地之謂文戡㝎祸亂之謂武先天不違之謂法天道濟天下之謂應道盖取易繫辭也謂之法易繫辭曰闔户謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神凡經子傳記用此多矣故不􅊖載之法孟子曰勞之来之匡之直之輔之翼之老子曰故道生之畜之長之育之成之熟之養之覆之若易説卦曰雷以動之風以散之雨以潤之日以烜之艮以止之兌以説之乾以君之坤以蔵之此又一法也可法考工記曰故可規可萭可水可縣可量表記曰事君可貴可賤可富可貧可生可殺可以法論語曰詩可以興可以觀可以羣可以怨月令曰可以登髙明可以逺眺望可以升山陵可以䖏臺榭荘子曰可以保身可以全生可以養親可以盡年為法易説卦曰乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果荘子曰形就而入且為顛為㓕為崩為蹶心和而出且為聲為名為妖為孽此又一法也必法考工記曰容轂必直陳篆必正施膠必厚施筋必數月令曰秫稻必齊麯蘖必時湛熾必潔水泉必香陶器必良火齊必得不以法左氏傳曰不以國不以官不以山川不以隐疾不以畜牲不以器幣無法左氏傳曰無始亂無怙富無恃寵無違同無傲禮無驕䏻無復怒無謀非徳無犯非義而不法左氏傳曰直而不倨曲而不屈邇而不偪逺而不攜遷而不滛復而不厭哀而不愁樂而不荒用而不匱廣而不宣施而不費取而不貪䖏而不底行而不流其法易繫辭曰其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隐樂記曰其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲彂以㪚其怒心感者其聲粗以厲其敬心感者其聲直以亷其愛心感者其聲和以柔此雖每句用其字而二句以見意又一法也焉法祭統曰見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之䓁焉見親踈之殺焉見爵賞之施焉見夫婦之別焉見政事之均焉見長㓜之序焉見上下之際焉學記曰蔵焉修焉息焉游焉三年問曰翔回焉鳴號焉蹢䠱焉踟蹰焉又一法也于時法詩曰于時䖏䖏于時廬旅于時言言于時語語鄭康成云時是也實法詩曰實方實苞實種實褎實發實秀實堅實好實頴實栗曾是法詩曾是疆禦曾是掊克曾是在位曾是在服侯法詩曰侯主侯伯侯亞侯旅侯疆侯以有若法書曰有若虢叔有若閎夭有若散宜生有若泰顛有若南宫括未嘗法家語曰未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危斯法檀弓曰人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯慍慍斯戚戚斯歎歎斯辟矣於是乎法國語曰上帝之粢盛於是乎出民之蕃庻於是乎生事之供給於是乎在和恊輯睦於是乎興財用蕃殖於是乎始敦厖純固於是乎成有法禮器曰有直而行也有曲而殺也有經而䓁也有順而討也有摲而播也有推而進也有放而文也有放而不致也有順而摭也樂師曰有帗舞有羽舞有皇舞有旄舞有干舞有人舞左氏傳曰名有五有信有義有象有假有類又一法也孟子曰父子有親君臣有義夫婦有別長㓜有序朋友有信此又一法也兮法荀子曰井井兮其有條理也嚴嚴兮其能敬已也分分兮其有終始也厭厭兮其䏻長久也樂樂兮其執道不殆也炤炤兮其用知之明也脩脩兮其用統類之行也綏綏兮其有文章也熙熙兮其樂人之臧也隐隐兮其怨人不當也則法中庸曰誠則形形則著著則明明則動動則變變則化然法荀子曰儼然壮然祺然蕼然恢恢然廣廣然昭昭然蕩蕩然奚法荘子曰奚為奚據奚避奚取奚就奚去奚樂而法荘子曰而容崖然而目衝然而顙頩然而口闞然而状義然又一法也考工記曰清其灰而盝之而揮之而沃之而盝之而塗之而宿之方且法荘子曰方且本身而異形方且尊知而火馳方且為緒使方且為物絃方且四頋而物應方且應衆宜方且與物化似法荘子曰似鼻似口似耳似枅似圈似白者似洼者似汙者此言風吹竅穴動作之貌乎法荘子曰與乎其觚而不堅也張乎其虚而不華也邴邴乎其似喜乎崔乎其不得已乎滀乎進我色也與乎止我徳也厲乎其似世乎謷乎其未可制也連乎其似好閉也悗乎忘其言也禮運曰洞洞乎其敬也属属乎其忠也勿勿乎其欲其饗之也荘子盖廣其法而用之廼法詩曰廼慰廼止廼左廼右廼疆廼理廼宣廼畝以之法仲尼燕居曰以之居䖏有禮故長㓜辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也足以法易曰體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事中庸曰聪明睿知足以有臨也寛裕溫柔足以有容也發强剛毅足以有執也齊荘中正足以有敬也文理宻察足以有別也此又一法也也法中庸曰修身也尊賢也親親也敬大臣也體羣臣也子庶民也来百工也柔逺人也懐諸侯也若周易雜卦一萹全用也字文不可盡舉得其法仲尼燕居曰宫室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗䘮紀得其哀辨説得其當官得其本政事得其施以法大司樂曰以致鬼神示以和邦國以諧萬民以安賔客以説逺人以作動物周禮此法極多今不備載曰法洪範曰一曰水二曰火三曰木四曰金五曰土周禮凡次序其事皆類此一法也周禮小胥曰曰風曰賦曰比曰興曰雅曰頌洪範曰曰雨曰霽曰䝉曰驛曰克曰貞曰悔凡此類不言數又一法也大宗伯曰春見曰朝夏見曰宗秋見曰覲冬見曰遇時見曰㑹殷見曰同易繫辭曰天地之大徳曰生聖人之大寳曰位何以守位曰仁何以聚人曰財理財正辭禁民為非曰義凡此類又一法也得之法荘子曰豨韋氏得之以挈天地伏羲得之以襲氣母維斗得之終古不忒日月得之終古不息堪坏得之以襲崑崙馮夷得之以逰大川肩吾得之以䖏大山黄帝得之以登雲天顓頊得之以䖏元宫云云之以法禮運曰慮之以大愛之以敬行之以禮脩之以孝養紀之以義終之以仁所以法禮運曰祭帝於郊所以㝎天位也祀社於國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也存乎法易繫辭曰列貴賤者存乎位齊小大者存乎卦辨吉㓙者存乎辭憂悔吝者存乎介震无咎者存乎悔莫大乎法易繫辭曰法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇髙莫大乎富貴備物致用立成器以為天下利莫大乎聖人云云知所以法中庸曰則知所以脩身知所以脩身則知所以治人知所以治人則知所以治天下國家矣矣法六月詩序曰鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣棠棣廢則兄弟缺矣下皆類此不能􅊖載板詩曰辭之輯矣民之洽矣辭之懌矣民之莫矣此雖毎句用矣字而上下之意相闗大扺經傳之文有相類者非固出於蹈襲實理之所在不約而同也略條於後則可推矣詩曰禮義不愆何恤於人言注此逸詩荀子引之云禮義之不愆兮何恤人之言兮左氏傳載士蒍稱諺曰心茍無瑕何恤乎無家不詩曰謂予不信有如皦日左氏傳載公子重耳曰所與舅氏同心有如白水注凡指物為誓語多類如此曰詩曰不憗遺一老俾守我王左氏傳魯哀公誄孔丘不憗遺一老俾屏予一人以在位此不約而同一也曰左氏傳曰晋韓起䀻魯觀書於大史氏見易象春秋周禮盡在魯矣吾乃今知周公之徳與周之所以王也家語曰孔子適周厯郊杜之所考明堂之則察廟朝之度於是喟然曰吾乃今知周公之徳與周之所以王也此不約而同二也左氏傳曰晋侯疾病求醫於秦秦伯使醫緩為之醫至曰疾不可為也在肓之上膏之下戰國䇿曰扁鵲見秦武王武王示之病扁鵲請除左右曰君之病在耳之前目之下此不約而同三也載左氏傳載周子曰二三子用我今日否亦今日國語吴王曰孤之事君在今日不得事君亦在今日此不約而同四也國語載觀射父曰先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之左氏傳載晏子曰先王之濟五味和五聲也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也注此文既於物恊数又扵數恊序亦文之工者此不約而同五也之考工記曰柘為上檍次之檿桑次之橘次之木𤓰次荆次之禮器曰禮時為大順次之宜次之稱次之此不約而同六也春秋之時王道雖微文風未殄森羅辭翰備括規摹考諸左氏摘其英華別為八體各繫本文一曰命婉而當尚書有命八萹二曰誓謹而嚴尚書有誓八萹三曰盟約而信四曰禱切而慤尚書武成有武王伐紂禱辭自惟有道曽孫發至無作神羞是其文也五曰諌和而直六曰讓辨而正七曰書逹而法八曰對羙而敏作者觀之庶知古人之大全也命周靈王命齊靈公如周襄王命晋重耳其體亦可法王曰昔伯舅太公右我先王股肱周室師保萬民世胙太師以表東海王室之不壊繄伯舅是頼今予命女環兹率舅氏之典纂乃祖考無沗乃舊敬之㢤無廢朕命誓趙簡子誓伐鄭誓曰范氏中行氏反易天明斬艾百姓欲擅晋國而滅其君寡君恃鄭而保焉今鄭為不道棄君助臣二三子順天明從君命經徳義除詬恥在此行也克敵者上大夫受縣下大夫受郡士田十萬庶人工商遂人臣𨽻圉免志父無罪君實圖之若其有罪絞縊以戮桐棺三寸不設屬辟素車樸馬無入于兆下卿之罰也盟亳城之盟如孟子載葵丘盟辭觀三傳則詳畧異同今所不取載書曰凡我同盟毋薀年毋壅利毋保姦毋留慝救災患恤祸亂同好惡奨王室或間兹命司鎮司盟名山名川羣神羣祀先王先公七姓十二國之祖明神殛之俾失其民隊命亡氏踣其國家禱衛蒯瞶禱于鐡荀偃禱河其體亦法此禱曰曽孫蒯聵敢昭告皇祖文王烈祖康叔文祖襄公鄭勝亂従晋午在難不䏻治亂使鞅討之蒯聵不敢自佚備持矛焉敢告無絶筋無折骨無靣傷以集大事無作三祖羞大命不敢請佩玉不敢愛諌臧哀伯諌魯威公納鼎諌文多矣今取此為體諌曰君人者将昭徳塞違以臨照百官猶懼或失之故昭令徳以示子孫是以清廟茅屋大路越席大羹不致粢食不鑿昭其儉也衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也錫鸞和鈴昭其聲也三辰旂旗昭其明也夫徳儉而有度登降有數文物以紀之聲明以彂之以臨照百官百官於是乎戒懼而不敢易紀律今㓕徳立違而寘其賂器於太廟以明示百官百官象之其又何誅焉國家之敗由官邪也官之失徳寵賂章也郜鼎在廟章孰甚焉武王克商遷九鼎于雒邑義士猶或非之而况将昭違亂之賂器於太廟其若之何讓責也周詹威伯責晋率隂戎伐潁辭曰我自夏以后稷魏駘芮岐畢吾西土也及武王克商蒲姑商奄吾東土也巴濮楚鄧吾南土也肅慎燕亳吾北土也吾何邇封之有文武成康之建母弟以蕃屏周亦其廢隊是為豈如弁髦而因以敝之先王居檮杌于四裔以禦魑魅故允姓之姦居于𤓰州伯父恵公歸自秦而誘以来使偪我諸姬入我郊甸戎焉取之戎有中國誰之咎也后稷封殖天下今戎制之不亦難乎伯父圖之我在伯父猶衣服之有冠冕水木之有本源民人之有謀主也伯父若裂冠毁冕㧞本塞源専棄謀主雖戎狄其何有余一人書晋叔向詒鄭子産鑄刑書書子産與范宣子書其體可法書曰始吾有虞於子今則已矣昔先王議事以制不為刑辟懼民之有争心也猶不可禁禦是故閑之以義糾之以政行之以禮守之以信奉之以仁制為禄位以勸其従嚴㫁刑罰以威其滛懼其末也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊㫁之以剛猶求聖哲之上明察之官忠信之長慈恵之師民於是乎可任使也而不生祸亂民知有辟則不忌於上並有争心以徴於書而儌幸以成之弗可為矣夏有亂政而作禹刑商有亂政而作湯刑周有亂政而作九刑三辟之興皆叔世也今吾子相鄭國作封洫立謗政制參辟鑄刑書将以靖民不亦難乎詩曰儀式刑文王之徳日靖四方又曰儀刑文王萬邦作孚如是何辟之有民知争端矣将棄禮而徴於書錐刀之末将盡争之亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國将亡必多制其此之謂乎對鄭子産對晋人問陳罪對文多矣今取此為體對曰昔虞閼父為周陶正以服事我先王我先王頼其利器用也與其神明之後也庸以元女大姬配胡公而封諸陳以備三恪則我周之自出至于今是頼桓公之亂蔡人欲立其出我先君荘公奉五父而立之蔡人殺之我又與蔡人奉戴厲公至於荘宣皆我之自立夏氏之亂成公播蕩又我之自入君所知也今陳忘周之大徳蔑我大恵棄我姻親介恃楚衆以凴陵我敝邑不可億逞我是以有往年之告未獲成命則有我東門之役當陳隧者井堙木刋敝邑大懼不競而恥大姬天誘其衷唘敝邑心陳知其罪授首于我用敢獻功云云盤庚之戒無伏攸箴宣王之詩庭燎因箴箴之為名見於經矣在昔周武辛甲為吏爰命百官各箴王闕故虞人之箴魏絳獨有取焉今採其文以備箴體芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒於原獸亡其國恤而思其麀牡武不可重用不恢於夏家獸臣司原敢告僕夫益賛于禹賛起逺矣後世史官紀傳有賛以擬詩體非古法也今采書文以備賛體惟徳動天無逺弗届滿招損謙受益時乃天道帝初于厯山往于田號泣于旻天于父母負罪引慝祇載見瞽瞍䕫䕫齊慄瞽亦允若至諴感神矧兹有苖銘文之作初無㝎體量人量銘乃類詩雅孔悝鼎銘無異書命成湯盤銘考父鼎銘體又别矣四體俱采古法備焉量銘時文思索允臻其極嘉量既成以觀四國永唘厥後兹器維則鼎銘孔悝六月丁亥公假于太廟公曰叔舅乃祖荘叔左右成公成公乃命荘叔随難于漢陽即宫于宗周奔走無射唘右獻公獻公乃命成叔纂乃祖服乃考文叔興舊耆欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休㢤公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于烝彛鼎盤銘大戴禮湯几杖之属皆有銘此盤銘獨見禮記鼎銘一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是粥於是以餬余口賡載之歌既煥虞謨五子之歌又昭夏訓作者蔚起各自為體孔子消揺接輿佯狂歌詞玉振鮮其儷㦲特取二歌餘在所畧孔子歌泰山其頽乎梁木其壊乎哲人其萎乎接輿歌荘子亦載此歌曰鳳兮鳳兮何如徳之衰也来世不可待往世不可追也雖有小增損然氣象與論語不同鳳兮鳳兮何徳之衰往者不可諌来者猶可追已而已而今之従政者殆而歌之流也又別為三一曰謡二曰謳齊歌曰謳獨歌曰謡三曰誦周謡鸜鵒晋謡龍鶉城者築者所謳不同國人輿人其誦亦異雖皆芻詞猶可觀法備見左氏采其尤乎晋謡丙之辰龍尾伏辰均服振振取虢之旂鶉之賁賁天䇿焞焞火中成軍虢公其奔築謳澤門之晳實興我役邑中之黔實慰我心輿誦取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之後漢岑彭為魏郡太守輿人歌曰我有枳棘岑君伐之我有蟊賊岑君遏之盖又法此也祭有祝嘏死有誄謚周公之制備矣祝嘏尚欽誄謚宜實考諸禮籍有士虞祭祝辭貞恵文子謚辭實作者之儀表也今取之士虞祝辭哀子某哀顯相夙興夜䖏不寕敢用潔牲剛鬛香合嘉薦普淖明齊溲酒哀薦祫事適邇皇祖某甫饗今之祝文唯同尚饗二字餘皆非古法也貞恵文子謚辭昔者衞國凶饑夫子為粥與國之餓者是不亦恵乎昔者衞國有難夫子以其死衞寡人不亦貞乎夫子聴衞國之政脩其班制以與四鄰交衞國之社稷不辱不亦文乎故謂夫子貞恵文子古無三字謚法唐李巽謂衞君之亂制也今取其文故不復議傳記所載古作紛然未容􅊖數且箕子麥秀之詩下符黍離之詠箕子朝周過殷之故城盡生禾黍傷之作麥秀之歌其詩曰麥秀漸漸兮禾黍油油兮彼狡童兮不與我好兮此與黍離之所作無異黍離序曰周大夫行役至于宗周過故宗廟宫室盡為禾黍閔周室之顛覆而作是詩越人擁楫之歌上體綢繆之意鄂君與越人同舟越人擁揖而歌曰今夕何夕兮得與搴舟水流今日何日兮得與王子同舟此與綢繆詩言今夕何夕見此良人之意同也迎日之辭與洛誥同文迎日之辭曰維某年月上日明光於上下勤施于四方旁作穆穆維予一人某敬拜迎日東郊洛誥成王稱周公曰惟公徳明光於上下勤施于四方旁作穆穆迓衡冠王之頌與士禮辭類成王冠周公作頌曰令月吉日王始加元服去王㓜志思宏衮職欽若昊天六合是式率爾祖考永永無極士冠禮加祝曰令月吉日始加元服棄爾㓜志順爾成徳夀考維祺介爾景福虞舜慶雲之作有虞之時有慶雲百工相和而歌舜乃倡之曰慶雲爛兮糺縵縵兮日月光華旦復旦兮成湯旱禱之文湯旱而禱曰政不節與使民疾與何以不雨至斯極也宫室崇與婦謁盛與何以不雨至斯極也䜛夫興與苞苴行與何以不雨至斯極也潤色之語不全典誥之風作者如欲博觀於此宜加旌別唐虞三代君臣之間告戒荅問之言雍容溫潤自然成文降及春秋名卿才大夫尤重詞命婉麗華藻咸有古義秦漢而来上之詔命皆出親製是故第五倫見光武詔書歎曰此聖王也一見决矣自後不然凡有王言悉責成臣下而臣下又自有章表是以束帶立朝之士相尚博洽肆其茟端徒盈萹牘甚至於駢儷其文俳諧其語所謂代言與夫奏上之體俱失之矣今采摭尚書及左氏内外傳之語可以代言奏上者録之庶使古人之羙昭然可法如漢武帝初作誥以立三王各以土俗申戒文辭氣象未逺於古併附于後舜命契作司徒語契百姓不親五品不遜汝作司徒敬敷五教在寛命臯陶作士語臯陶蠻夷猾夏冦賊姦宄汝作士五刑有服云云惟明克允命伯夷作秩宗語伯夷汝作秩宗夙夜惟寅直㢤惟清命䕫典樂語䕫命汝典樂教胄子直而溫寛而栗剛而無虐簡而無傲至八音克諧無相奪倫神人以和命龍作納言語龍朕堲䜛説殄行震驚朕師命汝作納言夙夜出納朕命惟允羙禹陳九功語地平天成六府三事允治萬世永頼時乃功勉臯陶作士語臯陶惟兹臣庶罔或干予正汝作士明于五刑以弼五教期于予治刑期于無刑民恊于中時乃功懋㢤又羙臯陶語俾予従欲以治四方風動帷乃之休舜又命禹語臣作朕股肱耳目予欲左右有民汝翼至退有後言湯制官刑儆戒百官語敢有恒舞于宫至時謂亂風髙宗命傳説語朝夕納誨以輔台徳至欽予時命其惟有終羙傳説進戒語王曰旨㢤説乃言惟服至予罔聞于行又命傳説語王曰四海之内咸仰朕徳至罔俾阿衡専羙有商成王命微子代商後語乃祖成湯克齊聖廣淵至往㢤無替朕命封康叔語用康乃心至明乃服命命蔡仲為侯語小子胡至無荒棄朕命董正百官語今予小子祇勤于徳至敬爾有官亂爾有政命君陳分正東郊語君陳惟爾令徳孝恭至人臣咸若時惟良顯㢤康王誥諸侯語昔君文武至罔不在王室命畢公保釐東郊語惟周公左右先王綏㝎厥家至罔曰弗克惟既厥心穆王命君牙為大司徒語君牙惟乃祖乃父服勞王家至宏敷五典式和民則命伯冏為太僕正語伯冏惟予弗克于徳至永弼乃后于彛憲平王錫晋文侯語汝多脩扞我于艱至馬四匹父往㢤晋悼公賜魏絳樂語子教寡人和諸戎狄以正諸華八年之中九合諸侯如樂之和無所不諧請與子樂之魏絳辭樂語夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也書曰居安思危思則有備有備無患敢以此規晋張老辭卿語臣不如魏絳夫絳之智䏻治大官其仁可以利公室不忘其勇不疚扵刑其學不廢其先人之職若在卿位外内必平衛大叔文子謝罪語臣知罪矣臣不佞不䏻負覊絏以従扞牧圉臣之罪一也有出者有居者臣不䏻貳通内外之言以事君臣之罪二也臣有二罪敢忘其死鄭子産辭邑語自上以下降殺以両禮也臣之位在四且子展之功也臣不敢及賞禮請辭邑衛公孫免餘辭邑語唯卿備百邑臣六十矣下有上禄亂也臣弗敢聞且寗子惟多邑故死臣懼死之速及也齊晏子辭更宅語臣之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅衛子魚辭従㑹語臣展四體以率舊職猶懼不給而煩刑書若又共二徼大罪也且夫祝社稷之常𨽻也社稷不動祝不出境官之制也若嘉好之事臣無事焉陳敬仲辭卿語覉旅之臣幸若獲宥及於寛政赦其不閑於教訓而免扵罪戾弛扵負擔君之恵也所獲多矣敢辱髙位以速官謗請以死告齊威公對賜胙無下拜語天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以遺天子羞敢不下拜齊管仲辭荘王以上卿禮饗語臣賤有司也有天子之二守國髙在若節春秋来承王命何以禮焉陪臣敢辭荘王命管仲語舅氏余嘉乃勲應乃懿徳謂督不忘往踐乃職無逆朕命鄭燭之武辭文公使見秦穆公語臣之壮也猶不如人今老矣無䏻為也己楚子西辭為商公語臣免扵死又有䜛言謂臣将迯臣歸死扵司敗也晋平公䇿命鄭公孫叚語子豐有勞扵晋國余聞而弗忘賜女州田以胙乃舊勲晋祁奚薦子為軍尉語人有言曰擇臣莫若君擇子莫若父午之少也婉以従令逰有鄉䖏有所好學而不戯其壮也彊而用命守業而不滛其冠也和安而好敬柔恵小物而鎮㝎大事有直質而無流心非義不變非上不舉若臨大事其可以賢扵臣臣請薦所䏻擇而君比義焉晋狐偃辭卿語毛之智賢于臣其齒又長毛也不在位不敢聞命注毛偃之兄韓獻子為子無忌辭公族大夫語厲公之亂無忌備公族不䏻死臣聞之曰無功庸者不敢居髙位無忌智不䏻正君使至扵難仁不䏻救勇不䏻死敢辱君朝以沗韓宗請退也晋趙衰辭卿語欒枝正謹先軫有謀胥臣多聞皆可以為輔佐臣弗若也齊鮑叔辭宰語臣君之庸臣也君加恵扵臣使不凍餒則是君之賜也若必治圉家者則非臣之所䏻也若必治國家者則管夷吾乎臣之所不若夷吾者五寛恵柔民弗若也治國家不失其柄弗若也忠信可結扵百姓弗若也制禮義可法扵四方弗若也執枹鼔立扵軍門使百姓加勇焉弗若也漢齊王閎封䇿語於戯小子䦒受兹青社朕承天序維稽古建爾國家封于東土世為漢藩輔於戯念㢤恭朕之詔惟命不于常人之好徳克明顯光義之不圖俾君子怠􅊖爾心允執其中天禄永終厥有愆不臧迺凶于乃國而害于爾躬於戯保國乂民不可敬與王其戒之燕王旦封䇿語於戯小子旦受兹元社封于北土世為漢藩輔於戯薰鬻氏虐老獸心以姦巧邉甿朕命将率徂征厥罪萬夫長千夫長三十有二帥降旗奔師薰鬻徙域北州以妥􅊖爾心母作怨毋作棐徳毋廢廼備非教士不得従徴王其戒之廣陵王胥封䇿語於戯小子胥受兹赤社建爾國家封于南土世世為漢藩輔古人有言曰大江之南五湖之問其人輕心揚州保疆三代要服不及以正於戯􅊖爾心祇祇兢兢廼恵廼順毋桐好佚毋邇宵人惟法惟則書云臣不作福不作威靡有後羞王其戒之文則巻下
