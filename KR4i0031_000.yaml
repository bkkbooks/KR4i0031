body:
  text: 提要文則二卷詩文評類臣等謹案文則二卷宋陳騤撰騤有南宋館閣録已著録按太平御覽引摯虞文章流别論曰古詩之三言者振振鷺鷺于飛是也漢郊廟歌多用之五言者誰謂雀無角何以穿我屋是也樂府用之六言者我姑酌彼金罍是也樂府亦用之七言者交交黃鳥止于桑是也於俳諧倡樂用之九言者洞酌彼行潦挹彼注兹是也不入歌謠之章故世稀為之文章句法推本六經兹其權輿也劉知幾史通特出模擬一篇於貌同心異貌異心同辨析特精是又不以句法求六經矣騤此書所列文章體式雖該括諸家而大旨皆凖經以立制其不使人根據訓典鎔精理以立言而徒較量于文之增減未免逐末而遺本又分門别類頗嫌於太瑣太拘亦不免舍大而求細然取格法于聖籍終勝摹機調于後人其所標舉神而明之存乎其人固不必以定法泥此書亦不必以定法病此書也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀陳騤自序騤始冠逰泮宫從老於文者問焉僅得文之端緒後三年入成均復從老於文者問焉僅識文之利病彼老於文者有進取之纍所有告於我與夫我所得唯利於進取後四年竊第而歸未獲從仕凡一星終得以恣閲故書始知古人之作嘆曰文當如是且詩書二禮易春秋所載邱眀髙赤所傳老莊孟荀之徒所著皆學者所朝夕諷誦之文也徒諷誦而弗考猶終日飲食而不知味騤竊每有考焉隨而録之遂盈簡牘古人之文其則著矣因號曰文則或曰方今宗匠巨儒濟濟盈庭下筆語妙天下雖與日月爭光可也奚以吾子文則為騤曰蓋將所以自則也如示人以為則則吾豈敢
